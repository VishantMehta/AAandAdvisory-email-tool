<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Campaign Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                <h1>Campaign Manager</h1>
            </div>
            <div class="header-status">
                <span class="status-indicator"></span>
                <span id="system-status">System Ready</span>
            </div>
        </header>

        <main class="dashboard">
            <div class="grid-column">
                <!-- Configuration Card -->
                <div class="glass-card config-card">
                    <h2>Configuration</h2>
                    <form id="campaign-form">
                        <div class="form-group">
                            <label for="campaignName">Campaign Name</label>
                            <input type="text" id="campaignName" placeholder="e.g. July-Newsletter" required>
                        </div>

                        <div class="form-group">
                            <label for="subject">Email Subject</label>
                            <input type="text" id="subject" placeholder="Hello from AAAND Advisory" required>
                        </div>

                        <div class="form-group">
                            <label for="template">HTML Template</label>
                            <select id="template" required>
                                <option value="" disabled selected>Loading templates...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="csv">Contact List (CSV)</label>
                            <div class="csv-upload-group">
                                <select id="csv" required>
                                    <option value="" disabled selected>Loading CSVs...</option>
                                </select>
                                <label for="csv-upload" class="upload-btn" title="Upload new CSV">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                </label>
                                <input type="file" id="csv-upload" accept=".csv" style="display: none;">
                            </div>
                        </div>

                        <div class="toggle-group">
                            <label class="toggle">
                                <input type="checkbox" id="dryRun" checked>
                                <span class="slider"></span>
                            </label>
                            <div class="toggle-info">
                                <span class="toggle-label">Dry Run Mode</span>
                                <span class="toggle-desc">Simulate sending without using quota</span>
                            </div>
                        </div>

                        <button type="submit" id="start-btn" class="primary-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            Start Campaign
                        </button>
                    </form>
                </div>

                <!-- Provider Quotas -->
                <div class="glass-card quotas-card">
                    <h2>Daily Capacity</h2>
                    <div class="quota-list">
                        <div class="quota-item">
                            <div class="quota-header">
                                <span>Resend</span>
                                <span id="quota-resend">--/--</span>
                            </div>
                            <div class="progress-bar"><div class="progress-fill resend-fill" id="prog-resend" style="width: 0%"></div></div>
                        </div>
                        <div class="quota-item">
                            <div class="quota-header">
                                <span>Brevo</span>
                                <span id="quota-brevo">--/--</span>
                            </div>
                            <div class="progress-bar"><div class="progress-fill brevo-fill" id="prog-brevo" style="width: 0%"></div></div>
                        </div>
                        <div class="quota-item">
                            <div class="quota-header">
                                <span>MailerSend</span>
                                <span id="quota-mailersend">--/--</span>
                            </div>
                            <div class="progress-bar"><div class="progress-fill mailersend-fill" id="prog-mailersend" style="width: 0%"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid-column">
                <!-- Terminal Output -->
                <div class="glass-card terminal-card">
                    <div class="terminal-header">
                        <div class="window-controls">
                            <span></span><span></span><span></span>
                        </div>
                        <div class="terminal-title">campaign-logs // live</div>
                        <button id="clear-logs" class="icon-btn" title="Clear Logs">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                    <div class="terminal-window" id="terminal">
                        <div class="log-line sys">Initialization complete. Awaiting command...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
